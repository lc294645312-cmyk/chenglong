<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BTC/ETH 短线分析助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#080c18;color:#c8d8f0;min-height:100vh;}
.header{background:linear-gradient(135deg,#0f1628,#08111f);padding:16px;text-align:center;border-bottom:1px solid #1a2a45;}
.header h1{font-size:18px;color:#5aacff;letter-spacing:1px;}
.header .sub{font-size:11px;color:#3a5878;margin-top:3px;}
.coin-tabs{display:flex;gap:0;margin:12px 12px 0;}
.coin-tab{flex:1;text-align:center;padding:10px;font-size:14px;font-weight:700;cursor:pointer;border:1px solid #1a2a45;color:#3a5878;background:#0c1422;transition:all .2s;}
.coin-tab:first-child{border-radius:10px 0 0 10px;}
.coin-tab:last-child{border-radius:0 10px 10px 0;}
.coin-tab.active{background:#1a3060;color:#5aacff;border-color:#3a6adf;}
.price-hero{margin:12px;background:linear-gradient(135deg,#0f1e3a,#0a1428);border:1px solid #1a2a45;border-radius:16px;padding:16px;}
.price-row{display:flex;justify-content:space-between;align-items:flex-start;}
.price-main .label{font-size:11px;color:#3a5878;}
.price-main .price{font-size:32px;font-weight:800;color:#5aacff;letter-spacing:-1px;}
.price-main .change{font-size:13px;margin-top:4px;}
.price-main .change.up{color:#2adf7a;}
.price-main .change.down{color:#df4a4a;}
.price-stats{text-align:right;}
.stat-row{font-size:11px;color:#5a7898;margin-bottom:4px;}
.stat-row span{color:#8ab0d0;}
.analyze-btn{width:calc(100% - 24px);margin:0 12px 12px;background:linear-gradient(135deg,#2a5adf,#1a3aaf);border:none;color:#fff;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.analyze-btn.loading{background:#1a2a45;color:#3a5878;}
.nav-tabs{display:flex;padding:0 12px;gap:6px;margin-bottom:10px;overflow-x:auto;}
.nav-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #1a2a45;color:#3a5878;background:transparent;white-space:nowrap;}
.nav-tab.active{background:#1a2a45;color:#5aacff;border-color:#5aacff;}
.tab-content{display:none;padding:0 12px 80px;}
.tab-content.active{display:block;}
.card{background:#0c1422;border:1px solid #1a2a45;border-radius:14px;padding:14px;margin-bottom:10px;}
.card-title{font-size:11px;color:#3a5878;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.indicator-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ind-item{background:#080c18;border-radius:8px;padding:8px 10px;}
.ind-label{font-size:10px;color:#3a5878;}
.ind-value{font-size:14px;font-weight:600;color:#8ab0d0;margin-top:2px;}
.ind-value.bull{color:#2adf7a;}
.ind-value.bear{color:#df4a4a;}
.ind-value.neutral{color:#dfaf2a;}
.state-badge{display:inline-block;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:12px;}
.state-bull{background:#0f2a1a;color:#2adf7a;border:1px solid #1a4a2a;}
.state-bear{background:#2a0f0f;color:#df4a4a;border:1px solid #4a1a1a;}
.state-neutral{background:#1a1a0f;color:#dfaf2a;border:1px solid #3a3a1a;}
.level-list{display:flex;flex-direction:column;gap:6px;}
.level-item{display:flex;justify-content:space-between;align-items:center;background:#080c18;border-radius:8px;padding:8px 12px;}
.level-type{font-size:11px;}
.level-type.res{color:#df4a4a;}
.level-type.sup{color:#2adf7a;}
.level-price{font-size:13px;font-weight:600;color:#8ab0d0;}
.level-dist{font-size:11px;color:#3a5878;}
.report-box{background:#080c18;border:1px solid #1a2a45;border-radius:12px;padding:14px;white-space:pre-wrap;font-size:13px;line-height:1.8;color:#a0c0e0;}
.report-box .loading-text{color:#3a5878;text-align:center;padding:20px;}
.add-form{background:#0c1422;border:1px solid #1a2a45;border-radius:14px;padding:14px;margin-bottom:10px;}
.form-row{display:flex;gap:8px;margin-bottom:10px;}
select,input{background:#080c18;border:1px solid #1a2a45;color:#c8d8f0;border-radius:8px;padding:10px 12px;font-size:14px;outline:none;width:100%;}
select{flex:1;}input{flex:2;}
input::placeholder{color:#2a3a55;}
.btn-add{width:100%;background:linear-gradient(135deg,#2a5adf,#1a3aaf);border:none;color:#fff;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}
.alert-item{background:#0c1422;border:1px solid #1a2a45;border-radius:12px;padding:12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.alert-coin{font-size:13px;font-weight:700;color:#5aacff;}
.alert-cond{font-size:12px;color:#5a7898;margin-top:2px;}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;}
